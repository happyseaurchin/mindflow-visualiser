<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MindFlow BYOK</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div id="left-panel">
      <div id="transcript-panel">
        <div id="transcript"></div>
      </div>
      <div id="llm-panel">
        <div id="llm-output"></div>
      </div>
    </div>
    <div id="canvas-panel">
      <canvas id="canvas"></canvas>
    </div>
    <div id="glyph-rail"></div>
    <div id="controls">
      <button id="mic-btn" title="Toggle microphone">Mic Off</button>
      <button id="clear-btn" title="Clear canvas">Clear</button>
      <label>Speed <input type="range" id="speed-slider" min="0.1" max="1" step="0.05" value="0.3"></label>
      <label>Decay <input type="range" id="decay-slider" min="0.5" max="3" step="0.1" value="1"></label>
      <label>Min freq <input type="range" id="min-freq-slider" min="1" max="5" step="1" value="1"><span id="min-freq-val">1</span></label>
      <button id="freeze-btn" title="Freeze/unfreeze canvas">Freeze</button>
      <button id="llm-btn" title="Toggle LLM features">LLM Off</button>
      <span id="llm-status"></span>
      <button id="settings-btn" title="API key settings">Settings</button>
      <button id="screenshot-btn" title="Download screenshot">Screenshot</button>
    </div>
  </div>

  <div id="settings-overlay" class="hidden">
    <div id="settings-panel">
      <h3>Settings</h3>
      <label for="api-key-input">Anthropic API Key</label>
      <input type="password" id="api-key-input" placeholder="sk-ant-..." autocomplete="off">
      <p class="settings-warning">Your key is stored locally in your browser. It's sent to our proxy which forwards it to Anthropic — it's never stored on our server. Set a spend limit on your <a href="https://console.anthropic.com/settings/limits" target="_blank">Anthropic dashboard</a>.</p>
      <div class="settings-actions">
        <button id="save-key-btn">Save Key</button>
        <button id="clear-key-btn">Clear Key</button>
        <button id="close-settings-btn">Close</button>
      </div>
      <div id="token-counter">Tokens this session: <span id="token-count">0</span></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
